<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 선생님</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, Arial,
                   'Noto Sans KR', sans-serif;
      background: #212121;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: #ececec;
      overflow: hidden;
    }

    /* ══ 헤더 ══ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      flex-shrink: 0;
    }
    .header-left  { display: flex; align-items: center; gap: 8px; }
    .header-title { font-size: 0.97rem; font-weight: 600; color: #ececec; }
    .header-badge {
      background: rgba(16,163,127,0.18);
      color: #10a37f;
      border: 1px solid rgba(16,163,127,0.3);
      font-size: 0.66rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .online {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.76rem; color: #6b6b7b;
    }
    .online-dot {
      width: 7px; height: 7px;
      background: #10a37f;
      border-radius: 50%;
      animation: glow 2.2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,163,127,.45); }
      50%      { box-shadow: 0 0 0 5px rgba(16,163,127,0);  }
    }

    /* ══ 채팅 영역 ══ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 3px; }

    /* 웰컴 */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px - 110px);
      padding: 32px 20px;
    }
    .welcome-logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg,#10a37f,#1a8cd8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 27px;
      margin-bottom: 22px;
      box-shadow: 0 4px 22px rgba(16,163,127,.3);
    }
    .welcome h2 {
      font-size: 1.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .welcome-sub {
      font-size: 0.92rem;
      color: #8e8ea0;
      margin-bottom: 34px;
      text-align: center;
      line-height: 1.6;
    }
    .examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }
    .ex-btn {
      background: #2f2f2f;
      color: #ececec;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 0.83rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .ex-btn:hover { background: #363636; border-color: #4a4a4a; transform: translateY(-1px); }
    .ex-btn:active { transform: translateY(0); }
    .ex-t { font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; }
    .ex-s { color: #8e8ea0; font-size: 0.75rem; }

    /* ══ 메시지 행 ══ */
    .msg-row { width: 100%; }
    .msg-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 24px;
    }

    /* 사용자 메시지 */
    .msg-row.user .msg-inner {
      display: flex;
      justify-content: flex-end;
    }
    .user-bubble {
      background: #2f2f2f;
      color: #ececec;
      border-radius: 20px;
      padding: 12px 18px;
      max-width: 72%;
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* AI 메시지 (버블 없음 — ChatGPT 스타일) */
    .msg-row.ai .msg-inner {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .ai-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg,#10a37f,#1a8cd8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ai-body { flex: 1; min-width: 0; }

    /* ══ 마크다운 스타일 ══ */
    .md {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #ececec;
      word-break: break-word;
    }
    .md h1,.md h2,.md h3 {
      color: #fff; font-weight: 700;
      margin: 20px 0 9px; line-height: 1.3;
    }
    .md h1 { font-size: 1.3rem; }
    .md h2 { font-size: 1.14rem; }
    .md h3 { font-size: 1.02rem; }
    .md p  { margin: 9px 0; }
    .md p:first-child { margin-top: 0; }
    .md p:last-child  { margin-bottom: 0; }
    .md strong { color: #fff; font-weight: 700; }
    .md em     { font-style: italic; color: #c5c5d2; }
    .md del    { text-decoration: line-through; color: #8e8ea0; }
    .md ul, .md ol { padding-left: 22px; margin: 10px 0; }
    .md li { margin: 6px 0; line-height: 1.7; }
    .md blockquote {
      border-left: 3px solid #10a37f;
      padding-left: 14px;
      margin: 12px 0;
      color: #8e8ea0;
      font-style: italic;
    }
    .md hr { border: none; border-top: 1px solid #333; margin: 18px 0; }
    .md code {
      background: #1e1e2e;
      color: #e2b96a;
      padding: 2px 6px;
      border-radius: 5px;
      font-family: 'Consolas','Monaco','Courier New',monospace;
      font-size: 0.87em;
    }
    .md .code-block {
      margin: 14px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2f2f3a;
    }
    .md .code-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 14px;
      background: #161622;
      font-size: 0.76rem;
      color: #8e8ea0;
    }
    .md .copy-code {
      background: none; border: none;
      color: #8e8ea0; cursor: pointer;
      font-size: 0.76rem; padding: 2px 8px;
      border-radius: 4px; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .md .copy-code:hover { color: #ececec; background: #2a2a3a; }
    .md pre { background: #1a1a2e; padding: 14px 16px; overflow-x: auto; margin: 0; }
    .md pre code {
      background: none; color: #abb2bf;
      padding: 0; font-size: 0.87rem; border-radius: 0;
    }

    /* 액션 버튼 */
    .ai-actions {
      display: flex; gap: 4px;
      margin-top: 10px;
      opacity: 0; transition: opacity .2s;
    }
    .msg-row:hover .ai-actions { opacity: 1; }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: #8e8ea0; cursor: pointer;
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.77rem; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .act-btn:hover { color: #ececec; background: #2f2f2f; }

    /* 타이핑 인디케이터 */
    .typing {
      display: flex; gap: 5px;
      align-items: center; height: 24px;
    }
    .typing span {
      width: 6px; height: 6px;
      background: #8e8ea0; border-radius: 50%;
      animation: tdot 1.3s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }
    .scursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: #ececec; margin-left: 1px;
      animation: blink .65s infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ══ 입력창 ══ */
    .input-section {
      flex-shrink: 0;
      padding: 10px 20px 22px;
    }
    .input-box {
      max-width: 760px; margin: 0 auto;
      background: #2f2f2f;
      border: 1px solid #404040;
      border-radius: 18px;
      display: flex; flex-direction: column;
      padding: 12px 14px 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 0 0 1px rgba(255,255,255,.06);
    }
    textarea {
      background: none; border: none; outline: none;
      color: #ececec; font-family: inherit;
      font-size: 0.95rem; resize: none;
      max-height: 180px; line-height: 1.6; width: 100%;
    }
    textarea::placeholder { color: #666; }
    .input-footer-row {
      display: flex; justify-content: flex-end;
      align-items: center; margin-top: 8px;
    }
    .send-btn {
      width: 34px; height: 34px;
      background: #fff; border: none;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .send-btn:hover   { background: #e8e8e8; }
    .send-btn:active  { background: #d0d0d0; }
    .send-btn:disabled { background: #3a3a3a; cursor: default; }
    .send-btn svg { width: 16px; height: 16px; }
    .send-btn svg path { fill: #212121; }
    .send-btn:disabled svg path { fill: #666; }
    .input-notice {
      text-align: center; font-size: 0.71rem;
      color: #555; margin-top: 9px;
      max-width: 760px; margin-left: auto; margin-right: auto;
    }

    /* 반응형 */
    @media (max-width: 600px) {
      .msg-inner { padding: 14px 13px; }
      .examples  { grid-template-columns: 1fr; max-width: 100%; }
      .welcome h2 { font-size: 1.55rem; }
      .input-section { padding: 8px 13px 18px; }
      .user-bubble { max-width: 88%; }
    }
  </style>
</head>

<script>
const API_KEY = "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";
const API_URL = "https://api.groq.com/openai/v1/chat/completions";

/* ── 시스템 프롬프트 ── */
const SYSTEM_PROMPT = `MANDATORY LANGUAGE RULE:
- You MUST write ONLY in Korean (한국어). Every character must be Korean, Arabic numerals, or standard ASCII.
- ABSOLUTELY FORBIDDEN: Chinese characters (呼吸,運動,漢字…), Cyrillic (а,б,в…), Japanese (hiragana/katakana), Arabic, Thai, or any non-Korean/non-ASCII script.
- Foreign technical terms must be written in Korean phonetics: benzene→벤젠, oxygen→산소, glucose→포도당, electron→전자.

MANDATORY FORMAT RULE:
- For numbered lists, ALWAYS use "1.", "2.", "3." format — never use ". " alone.
- For bullet lists, ALWAYS use "- " prefix.
- Use markdown: **굵게**, *기울임*, ## 제목, - 목록, 1. 번호목록.

---
너는 중학생을 위한 친절하고 정확한 AI 선생님이야.

핵심 원칙:
1. **정확성 최우선**: 과학적·수학적으로 검증된 사실만 말한다. 틀린 설명은 절대 하지 않는다.
2. **쉬운 한국어**: 중학생이 바로 이해할 수 있는 순수 한국어로 설명한다.
3. **체계적 구성**: 마크다운으로 읽기 편하게 정리한다.

답변 구조 (이 순서를 지킨다):
1. **핵심 정의** — 한 문장으로 정확하게
2. **비유/예시** — 중학생 일상과 연결된 구체적 예시 1개
3. **과정/원리** — 번호 목록(1. 2. 3.)으로 단계별 설명 (필요할 때)
4. **헷갈리는 점** — 자주 오해하는 내용 짚어주기

말투: 친근한 존댓말(~해요, ~이에요), 이모지 적당히
길이: 핵심만 담아 적당히 (너무 길지 않게)`;

/* ── 이상한 문자 자동 제거 ── */
function sanitize(text) {
  return text
    .replace(/[\u4E00-\u9FFF\u3400-\u4DBF]/g, "")   // 한자
    .replace(/[\u0400-\u04FF]/g, "")                  // 키릴
    .replace(/[\u3040-\u309F\u30A0-\u30FF]/g, "")     // 히라가나·가타카나
    .replace(/[\u0600-\u06FF\u0E00-\u0E7F]/g, "")     // 아랍·태국
    .replace(/\(\s*\)/g, "")
    .replace(/[ \t]{3,}/g, "  ")
    .trim();
}

/* ── HTML 이스케이프 ── */
function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── 인라인 포맷 ── */
function inlineFmt(s) {
  return s
    .replace(/\*\*\*([^*\n]+)\*\*\*/g, "<strong><em>$1</em></strong>")
    .replace(/\*\*([^*\n]+)\*\*/g,     "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g,         "<em>$1</em>")
    .replace(/~~([^~\n]+)~~/g,         "<del>$1</del>");
}

/* ── 마크다운 파서 ── */
function renderMD(md) {
  /* 1. 코드블록 추출 */
  const codeBlocks = [];
  let t = md.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang: lang.trim() || "code", code: code.trim() });
    return `\x00CB${codeBlocks.length - 1}\x00`;
  });

  /* 2. 인라인 코드 추출 */
  const inlines = [];
  t = t.replace(/`([^`\n]+)`/g, (_, c) => {
    inlines.push(c);
    return `\x00IC${inlines.length - 1}\x00`;
  });

  /* 3. 줄 단위 파싱 */
  const lines = t.split("\n");
  const out = [];
  let i = 0;

  while (i < lines.length) {
    const raw  = lines[i];
    const trim = raw.trim();

    /* 빈 줄 */
    if (!trim) { out.push(""); i++; continue; }

    /* 코드블록 플레이스홀더 */
    if (trim.includes("\x00CB")) { out.push(trim); i++; continue; }

    /* 제목 */
    const hm = trim.match(/^(#{1,3})\s+(.+)/);
    if (hm) {
      const lv = hm[1].length;
      out.push(`<h${lv}>${inlineFmt(esc(hm[2]))}</h${lv}>`);
      i++; continue;
    }

    /* 수평선 */
    if (/^---+$/.test(trim)) { out.push("<hr>"); i++; continue; }

    /* 인용 */
    if (trim.startsWith("> ")) {
      out.push(`<blockquote>${inlineFmt(esc(trim.slice(2)))}</blockquote>`);
      i++; continue;
    }

    /* 순서 없는 목록 (- / * / +) */
    if (/^[-*+]\s/.test(trim)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s/.test(lines[i].trim())) {
        items.push(`<li>${inlineFmt(esc(lines[i].trim().replace(/^[-*+]\s/, "")))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join("")}</ul>`);
      continue;
    }

    /* 순서 있는 목록: "1. " 또는 ". " (모델이 번호 없이 쓸 때도 처리) */
    if (/^(\d+\.|\.)[ \t]/.test(trim)) {
      const items = [];
      while (i < lines.length && /^(\d+\.|\.)[ \t]/.test(lines[i].trim())) {
        const text = lines[i].trim().replace(/^(\d+\.|\.)[ \t]/, "");
        items.push(`<li>${inlineFmt(esc(text))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join("")}</ol>`);
      continue;
    }

    /* 일반 단락 */
    out.push(`<p>${inlineFmt(esc(trim))}</p>`);
    i++;
  }

  let html = out.join("\n");

  /* 4. 인라인 코드 복원 */
  html = html.replace(/\x00IC(\d+)\x00/g, (_, idx) =>
    `<code>${esc(inlines[+idx])}</code>`
  );

  /* 5. 코드블록 복원 */
  html = html.replace(/\x00CB(\d+)\x00/g, (_, idx) => {
    const { lang, code } = codeBlocks[+idx];
    return `<div class="code-block">` +
      `<div class="code-head"><span>${esc(lang)}</span>` +
      `<button class="copy-code" data-code="${encodeURIComponent(code)}">복사</button></div>` +
      `<pre><code>${esc(code)}</code></pre></div>`;
  });

  return html;
}

/* ── 코드블록 복사 (이벤트 위임) ── */
document.getElementById("chatArea").addEventListener("click", e => {
  const btn = e.target.closest(".copy-code");
  if (!btn) return;
  navigator.clipboard.writeText(decodeURIComponent(btn.dataset.code || "")).then(() => {
    btn.textContent = "복사됨 ✓";
    setTimeout(() => btn.textContent = "복사", 1800);
  });
});

/* ── 상태 ── */
const history = [];
const chatArea = document.getElementById("chatArea");
const inputBox = document.getElementById("inputBox");
const sendBtn  = document.getElementById("sendBtn");

inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 180) + "px";

inputBox.addEventListener("keydown", e => {

function askExample(text) {

}

/* ── 메시지 생성 ── */
function appendUser(text) {
  document.getElementById("welcome")?.remove();
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `<div class="msg-inner"><div class="user-bubble"></div></div>`;
  row.querySelector(".user-bubble").textContent = text;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function createAiRow() {
  document.getElementById("welcome")?.remove();
  const row = document.createElement("div");
  row.className = "msg-row ai";
  row.innerHTML = `
    <div class="msg-inner">
      <div class="ai-icon">✨</div>
      <div class="ai-body">
        <div class="md"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    </div>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return row;
}

function addActionBtn(aiBody, fullText) {
  const div = document.createElement("div");
  div.className = "ai-actions";
  const btn = document.createElement("button");
  btn.className = "act-btn";
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2
    .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사`;
  btn.addEventListener("click", () => {
    navigator.clipboard.writeText(fullText).then(() => {
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> 복사됨`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9
          2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사`;
      }, 2200);
    });
  });
  div.appendChild(btn);
  aiBody.appendChild(div);
}

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || sendBtn.disabled) return;

  inputBox.value = "";
  inputBox.style.height = "auto";
  sendBtn.disabled = true;

  appendUser(text);
  history.push({ role: "user", content: text });

  const row    = createAiRow();
  const mdDiv  = row.querySelector(".md");
  const aiBody = row.querySelector(".ai-body");
  let full = "";
  let started = false;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model:       "llama-3.3-70b-versatile",
        messages:    [{ role: "system", content: SYSTEM_PROMPT }, ...history],
        temperature: 0.25,
        max_tokens:  1600,
        stream:      true,
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6).trim();
        if (raw === "[DONE]") break;
        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content;
          if (delta) {
            if (!started) { mdDiv.innerHTML = ""; started = true; }
            full += delta;
            // 스트리밍 중: 텍스트 + 커서
            mdDiv.textContent = full;
            const cur = document.createElement("span");
            cur.className = "scursor";
            mdDiv.appendChild(cur);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch (_) {}
      }
    }

    /* 완료: 정제 → 마크다운 렌더링 */
    if (full) {
      full = sanitize(full);
      mdDiv.innerHTML = renderMD(full);
      addActionBtn(aiBody, full);
    } else {
      mdDiv.innerHTML = "<p>죄송해요, 답변을 받지 못했어요. 다시 시도해 주세요.</p>";
    }

    history.push({ role: "assistant", content: full });
    if (history.length > 40) history.splice(0, 2);

  } catch (err) {
    mdDiv.innerHTML = `<p style="color:#f87171">⚠️ <strong>오류:</strong> ${esc(err.message)}</p>`;
    console.error(err);
  }

  sendBtn.disabled = false;
  chatArea.scrollTop = chatArea.scrollHeight;
  inputBox.focus();
}
</script>
