<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eungaram-1-2_GPT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #171717;
      --main-bg:    #212121;
      --input-bg:   #2f2f2f;
      --border:     #3a3a3a;
      --text:       #ececec;
      --muted:      #8e8ea0;
      --accent:     #10a37f;
      --hover:      #2a2a2a;
      --sidebar-w:  260px;
    }

    html, body { height: 100%; }

    body {
      font-family: ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, Arial,
                   'Noto Sans KR', sans-serif;
      background: var(--main-bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ════ SIDEBAR ════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 8px;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 4px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-logo-icon img { width: 32px; height: 32px; border-radius: 8px; }
    .sidebar-logo-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      width: 100%;
      text-align: left;
      transition: background .15s;
    }
    .new-chat-btn:hover { background: var(--hover); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-section-label {
      padding: 12px 12px 4px;
      font-size: 0.71rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .chat-history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s, color .15s;
    }
    .chat-history-item:hover { background: var(--hover); color: var(--text); }
    .chat-history-item.active { background: #2f2f2f; color: var(--text); }

    /* ════ MAIN ════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
    }
    .topbar-model {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #fff;
      cursor: default;
    }
    .topbar-model-badge {
      background: rgba(16,163,127,.18);
      color: #10a37f;
      border: 1px solid rgba(16,163,127,.3);
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 10px;
    }
    .report-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.35);
      border-radius: 8px;
      color: #ff7070;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, border-color .15s, transform .15s;
      font-family: inherit;
    }
    .report-btn:hover {
      background: rgba(255,80,80,0.22);
      border-color: rgba(255,80,80,0.6);
      transform: translateY(-1px);
    }
    @media (max-width: 600px) {
      .report-btn span.report-text { display: none; }
      .report-btn { padding: 7px 10px; }
    }
    .online-dot-wrap {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.76rem; color: var(--muted);
    }
    .online-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: glow 2.2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,163,127,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(16,163,127,0); }
    }

    /* 모바일 사이드바 토글 버튼 */
    .sidebar-toggle {
      display: none;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 6px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .sidebar-toggle:hover { color: var(--text); background: var(--hover); }

    /* ════ CHAT AREA ════ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 3px; }

    /* ── 웰컴 ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px - 140px);
      padding: 32px 20px;
      gap: 0;
    }
    .welcome-logo {
      width: 52px; height: 52px;
      background: #fff;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 18px rgba(0,0,0,.3);
    }
    .welcome-logo img { width: 40px; height: 40px; border-radius: 8px; }
    .welcome h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      text-align: center;
    }
    .examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 580px;
    }
    .ex-btn {
      background: #2f2f2f;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .ex-btn:hover { background: #363636; border-color: #4a4a4a; transform: translateY(-1px); }
    .ex-btn:active { transform: translateY(0); }
    .ex-t { font-weight: 600; font-size: 0.86rem; margin-bottom: 3px; }
    .ex-s { color: var(--muted); font-size: 0.75rem; }

    /* ── 메시지 행 ── */
    .msg-row { width: 100%; }
    .msg-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 24px;
    }

    /* 사용자 */
    .msg-row.user .msg-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .user-bubble {
      background: #2f2f2f;
      color: var(--text);
      border-radius: 20px;
      padding: 12px 18px;
      max-width: 72%;
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .user-file-preview {
      max-width: 72%;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f2f2f;
      border: 1px solid #404040;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .user-file-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      object-fit: cover;
    }
    .user-file-icon { font-size: 1.4rem; flex-shrink: 0; }

    /* AI */
    .msg-row.ai .msg-inner {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .ai-icon {
      width: 30px; height: 30px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ai-icon img { width: 28px; height: 28px; border-radius: 6px; }
    .ai-body { flex: 1; min-width: 0; }

    /* ── 마크다운 ── */
    .md {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      word-break: break-word;
    }
    .md h1,.md h2,.md h3 { color: #fff; font-weight: 700; margin: 20px 0 9px; line-height: 1.3; }
    .md h1 { font-size: 1.3rem; }
    .md h2 { font-size: 1.14rem; }
    .md h3 { font-size: 1.02rem; }
    .md p  { margin: 9px 0; }
    .md p:first-child { margin-top: 0; }
    .md p:last-child  { margin-bottom: 0; }
    .md strong { color: #fff; font-weight: 700; }
    .md em     { font-style: italic; color: #c5c5d2; }
    .md del    { text-decoration: line-through; color: var(--muted); }
    .md ul, .md ol { padding-left: 22px; margin: 10px 0; }
    .md li { margin: 6px 0; line-height: 1.7; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px; margin: 12px 0;
      color: var(--muted); font-style: italic;
    }
    .md hr { border: none; border-top: 1px solid #333; margin: 18px 0; }
    .md code {
      background: #1e1e2e; color: #e2b96a;
      padding: 2px 6px; border-radius: 5px;
      font-family: 'Consolas','Monaco','Courier New',monospace;
      font-size: 0.87em;
    }
    .md .code-block { margin: 14px 0; border-radius: 10px; overflow: hidden; border: 1px solid #2f2f3a; }
    .md .code-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 14px; background: #161622;
      font-size: 0.76rem; color: var(--muted);
    }
    .md .copy-code {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.76rem; padding: 2px 8px; border-radius: 4px; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .md .copy-code:hover { color: var(--text); background: #2a2a3a; }
    .md pre { background: #1a1a2e; padding: 14px 16px; overflow-x: auto; margin: 0; }
    .md pre code { background: none; color: #abb2bf; padding: 0; font-size: 0.87rem; border-radius: 0; }

    /* 액션 버튼 */
    .ai-actions {
      display: flex; gap: 4px;
      margin-top: 10px;
      opacity: 0; transition: opacity .2s;
    }
    .msg-row:hover .ai-actions { opacity: 1; }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.77rem; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .act-btn:hover { color: var(--text); background: #2f2f2f; }

    /* 타이핑 인디케이터 */
    .typing { display: flex; gap: 5px; align-items: center; height: 24px; }
    .typing span {
      width: 6px; height: 6px; background: var(--muted);
      border-radius: 50%; animation: tdot 1.3s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }
    .scursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--text); margin-left: 1px;
      animation: blink .65s infinite; vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ════ INPUT SECTION ════ */
    .input-section {
      flex-shrink: 0;
      padding: 8px 20px 16px;
    }
    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
    }

    /* 파일 첨부 미리보기 (비활성화)
    .file-preview-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 6px;
      background: #2f2f2f;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .file-preview-bar.visible { display: flex; }
    .file-preview-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name {
      font-size: 0.83rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview-size { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .file-preview-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px;
      font-size: 1rem; line-height: 1;
      transition: color .15s, background .15s;
    }
    .file-preview-remove:hover { color: #f87171; background: rgba(248,113,113,.1); }
    */

    .input-box {
      background: var(--input-bg);
      border: 1px solid #404040;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      padding: 12px 14px 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,.2);
      box-shadow: 0 0 0 1px rgba(255,255,255,.07);
    }
    textarea {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 0.95rem; resize: none;
      max-height: 180px; line-height: 1.6; width: 100%;
    }
    textarea::placeholder { color: #666; }

    .input-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .input-left-btns { display: flex; gap: 4px; align-items: center; }

    /* 파일 첨부 버튼 (비활성화)
    .attach-btn {
      width: 34px; height: 34px;
      background: none; border: 1px solid #505050;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .attach-btn:hover { background: #363636; color: var(--text); border-color: #666; }
    .attach-btn svg { width: 16px; height: 16px; }
    */

    /* 전송 버튼 */
    .send-btn {
      width: 34px; height: 34px;
      background: #fff; border: none;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .send-btn:hover   { background: #e8e8e8; }
    .send-btn:active  { background: #d0d0d0; }
    .send-btn:disabled { background: #3a3a3a; cursor: default; }
    .send-btn svg { width: 16px; height: 16px; }
    .send-btn svg path { fill: #212121; }
    .send-btn:disabled svg path { fill: #666; }

    .input-notice {
      text-align: center; font-size: 0.71rem;
      color: #555; margin-top: 9px;
    }

    /* 숨겨진 파일 입력 (비활성화)
    #fileInput { display: none; }
    */

    /* ════ MOBILE ════ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: -260px; top: 0; bottom: 0;
        z-index: 200;
        transition: left .25s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,.4);
      }
      .sidebar.open { left: 0; }
      .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 199;
      }
      .sidebar-overlay.visible { display: block; }
      .sidebar-toggle { display: flex; }
      .topbar { border-bottom: 1px solid var(--border); }
    }
    @media (max-width: 600px) {
      .msg-inner { padding: 14px 13px; }
      .examples  { grid-template-columns: 1fr; max-width: 100%; }
      .welcome h2 { font-size: 1.55rem; }
      .input-section { padding: 8px 13px 14px; }
      .user-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- 모바일 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <img src="eungaram-1-2_GPT_logo.png" alt="로고">
    </div>
    <span class="sidebar-logo-name">eungaram-1-2_GPT</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
    </svg>
    새 채팅
  </button>

  <div class="sidebar-section-label">오늘</div>
  <div id="chatHistoryList"></div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
  <!-- 상단 헤더 -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="사이드바">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <div class="topbar-model">
        eungaram-1-2_GPT
        <span class="topbar-model-badge">PRO</span>
      </div>
    </div>
    <div class="topbar-right">
      <a class="report-btn" href="https://open.kakao.com/o/sQsGreji" target="_blank" rel="noopener noreferrer" title="오류 신고">
        ⚠️ <span class="report-text">오류가 생길시 이 버튼을 눌러 여기로 보내주세요!</span>
      </a>
      <div class="online-dot-wrap">
        <div class="online-dot"></div>
        온라인
      </div>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <img src="eungaram-1-2_GPT_logo.png" alt="로고">
      </div>
      <h2>무엇을 도와드릴까요?</h2>
      <div class="examples">
        <button class="ex-btn" onclick="askExample('전류가 뭐야? 중학생한테 쉽게 설명해줘')">
          <div class="ex-t">⚡ 전류란?</div>
          <div class="ex-s">전기의 흐름을 쉽게 설명해줘</div>
        </button>
        <button class="ex-btn" onclick="askExample('원소와 분자의 차이는?')">
          <div class="ex-t">🔬 원소 vs 분자</div>
          <div class="ex-s">화학 개념 차이를 알려줘</div>
        </button>
        <button class="ex-btn" onclick="askExample('수학에서 함수가 뭐야? 비유로 설명해줘')">
          <div class="ex-t">📐 함수란?</div>
          <div class="ex-s">수학 함수 개념을 비유로</div>
        </button>
        <button class="ex-btn" onclick="askExample('광합성이 뭐야? 쉽게 설명해줘')">
          <div class="ex-t">🌱 광합성</div>
          <div class="ex-s">식물이 에너지 만드는 방법</div>
        </button>
      </div>
    </div>
  </div>

  <!-- 입력 -->
  <div class="input-section">
    <div class="input-wrapper">
      <!-- 파일 첨부 미리보기 (비활성화)
      <div class="file-preview-bar" id="filePreviewBar">
        <img src="" alt="미리보기" class="file-preview-thumb" id="filePrevThumb" style="display:none"/>
        <span class="file-preview-info">
          <div class="file-preview-name" id="filePrevName"></div>
          <div class="file-preview-size" id="filePrevSize"></div>
        </span>
        <button class="file-preview-remove" onclick="removeAttachment()" title="첨부 파일 제거">✕</button>
      </div>

### [1. 수학: 논리적 단계와 시각화]

### [2. 영어: 맥락과 뉘앙스]

* **원칙:** 문법은 '규칙'이 아닌 '의사소통의 약속'으로 접근한다.
* **도구:** 영문장과 한글 해석을 병기하고, 중학생 수준의 영단어 예문을 포함하라.

### [3. 과학: 정확한 비유와 반전]
* **답변 방식:** 현상 뒤에 숨겨진 **숨은 원리**를 밝혀라.
* **원칙:** 비유는 입문용으로만 쓰고, 반드시 실제 과학적 팩트로 마무리하라. (전류-전자 방향 차이 등)
1. 개념 정의의 명확성: > 물리량을 설명할 때는 '개념'과 '단위'를 엄격히 구분하라. (예: 전류는 현상/흐름이며, 암페어는 단위임을 명시)

2. 방향성 검증(필수): > 전류와 전자의 이동 방향을 설명할 때는 반드시 다음의 물리적 사실을 준수하라.

전자의 실제 이동: (-)극 → (+)극

전류의 약속된 방향: (+)극 → (-)극

이 두 방향은 서로 '반대'임을 반드시 강조할 것.

3. 문장 구조 및 중복 제거: > "전자는 전자가~"와 같은 동어반복을 금지하고, 인과관계가 명확한 단문의 형태로 작성하라.

4. 비유의 적절성: > 물의 비유를 사용할 경우, 수압(전압), 물의 흐름(전류), 파이프의 굵기(저항)의 대응 관계를 논리적으로 일치시켜라.
(예시: 전류는 회로를 따라 흐르는 전하의 흐름을 말합니다. 실제로 움직이는 주체는 음(-)전하를 띤 아주 작은 전자들입니다. 전자는 (-)극에서 밀려나 (+)극 쪽으로 끌려가며 이동합니다. 
하지만 과학사적 배경으로 인해, 우리는 전류의 방향을 전자의 이동과 반대인 **(+)에서 (-)**로 흐른다고 약속했습니다. 이 약속된 방향과 실제 입자의 움직임을 혼동하지 않는 것이 물리 공부의 시작입니다.)

### [7. 예체능 (음/미/체): 감각과 원리]
* **음악:** 화성학이나 리듬의 규칙을 수학적/감성적으로 연결.
* **미술:** 구도와 색채 대비가 시각적으로 어떤 심리적 효과를 주는지 설명.
* **체육:** 근육의 움직임이나 물리적 원리(예: 투구 시 회전력)를 결합하여 과학적으로 접근.

function sanitize(text) {
  return text
    .replace(/[\u4E00-\u9FFF\u3400-\u4DBF]/g, "")
    .replace(/[\u0400-\u04FF]/g, "")
    .replace(/[\u3040-\u309F\u30A0-\u30FF]/g, "")
    .replace(/[\u0600-\u06FF\u0E00-\u0E7F]/g, "")

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    .replace(/\*\*([^*\n]+)\*\*/g,     "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g,         "<em>$1</em>")
    .replace(/~~([^~\n]+)~~/g,         "<del>$1</del>");

      continue;
    }
    if (/^(\d+\.|\.)[ \t]/.test(trim)) {
      const items = [];
      while (i < lines.length && /^(\d+\.|\.)[ \t]/.test(lines[i].trim())) {
        const text = lines[i].trim().replace(/^(\d+\.|\.)[ \t]/, "");
        items.push(`<li>${inlineFmt(esc(text))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join("")}</ol>`);
      continue;
    }
    out.push(`<p>${inlineFmt(esc(trim))}</p>`);
    i++;
  }
  let html = out.join("\n");
  html = html.replace(/\x00IC(\d+)\x00/g, (_, idx) => `<code>${esc(inlines[+idx])}</code>`);
  html = html.replace(/\x00CB(\d+)\x00/g, (_, idx) => {
    const { lang, code } = codeBlocks[+idx];
    return `<div class="code-block">` +
      `<div class="code-head"><span>${esc(lang)}</span>` +
      `<button class="copy-code" data-code="${encodeURIComponent(code)}">복사</button></div>` +
      `<pre><code>${esc(code)}</code></pre></div>`;
  });
  return html;
}

/* ── 메시지 생성 ── */

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text) return;
  if (sendBtn.disabled) return;

  inputBox.value = "";
  inputBox.style.height = "auto";
  sendBtn.disabled = true;

  // 첫 메시지면 히스토리에 추가
  if (history.length === 0) {
    addToHistory(text.slice(0, 36) + (text.length > 36 ? '…' : ''));
  }

  appendUser(text, null);

  history.push({ role: "user", content: text });

  const row    = createAiRow();
  const mdDiv  = row.querySelector(".md");
  const aiBody = row.querySelector(".ai-body");
  let full = "";
  let started = false;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model:       "llama-3.3-70b-versatile",
        messages:    [{ role: "system", content: SYSTEM_PROMPT }, ...history],
        temperature: 0.25,
        max_tokens:  1600,
        stream:      true,
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6).trim();
        if (raw === "[DONE]") break;
        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content;
          if (delta) {
            if (!started) { mdDiv.innerHTML = ""; started = true; }
            full += delta;
            mdDiv.textContent = full;
            const cur = document.createElement("span");
            cur.className = "scursor";
            mdDiv.appendChild(cur);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch (_) {}
      }
    }

    if (full) {
      full = sanitize(full);
      mdDiv.innerHTML = renderMD(full);
      addActionBtn(aiBody, full);
    } else {
      mdDiv.innerHTML = "<p>죄송해요, 답변을 받지 못했어요. 다시 시도해 주세요.</p>";
    }

    history.push({ role: "assistant", content: full });
    if (history.length > 40) history.splice(0, 2);

  } catch (err) {
    mdDiv.innerHTML = `<p style="color:#f87171">⚠️ <strong>오류:</strong> ${esc(err.message)}</p>`;
    console.error(err);
  }

  sendBtn.disabled = false;
  chatArea.scrollTop = chatArea.scrollHeight;
  inputBox.focus();
}
