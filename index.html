<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중학생 AI 선생님</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 860px;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px 24px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 1.2rem; font-weight: 700; }
    .header-text p  { font-size: 0.82rem; opacity: 0.85; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── 채팅 영역 ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f8f9fc;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* 웰컴 카드 */
    .welcome {
      text-align: center;
      padding: 28px 16px;
      color: #6b7280;
    }
    .welcome .emoji { font-size: 3rem; margin-bottom: 10px; }
    .welcome h2 { font-size: 1.1rem; color: #374151; margin-bottom: 6px; }
    .welcome p  { font-size: 0.88rem; line-height: 1.6; }

    /* 예시 질문 */
    .examples {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .example-btn {
      background: #ede9fe;
      color: #6d28d9;
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .example-btn:hover { background: #ddd6fe; }

    /* 메시지 버블 */
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user  { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg.ai   .avatar { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
    .msg.user .avatar { background: #e5e7eb; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.ai   .bubble {
      background: #fff;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      color: #1f2937;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg,#667eea,#764ba2);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    /* 타이핑 인디케이터 */
    .typing .bubble {
      padding: 14px 18px;
    }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dots span {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* ── 입력 영역 ── */
    .input-wrap {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 11px 16px;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus { border-color: #667eea; }
    textarea::placeholder { color: #9ca3af; }

    .send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg,#667eea,#764ba2);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    .send-btn:hover   { opacity: 0.88; }
    .send-btn:active  { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { fill: #fff; width: 20px; height: 20px; }

    /* 반응형 */
    @media (max-width: 480px) {
      .container { height: 100vh; border-radius: 0; }
      .bubble { max-width: 88%; font-size: 0.88rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>중학생 AI 선생님</h1>
      <p><span class="status-dot"></span>쉽고 재미있게 설명해 드려요!</p>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="emoji">📚</div>
      <h2>안녕하세요! AI 선생님이에요 😊</h2>
      <p>어려운 개념도 <strong>쉬운 비유</strong>로 설명해 드릴게요.<br/>궁금한 게 있으면 무엇이든 물어보세요!</p>
      <div class="examples">
        <button class="example-btn" onclick="askExample('전류가 뭐야?')">⚡ 전류가 뭐야?</button>
        <button class="example-btn" onclick="askExample('원소와 분자의 차이는?')">🔬 원소 vs 분자</button>
        <button class="example-btn" onclick="askExample('함수가 뭐야?')">📐 함수가 뭐야?</button>
        <button class="example-btn" onclick="askExample('DNA가 뭐야?')">🧬 DNA가 뭐야?</button>
        <button class="example-btn" onclick="askExample('광합성을 쉽게 설명해줘')">🌱 광합성이란?</button>
        <button class="example-btn" onclick="askExample('관성이 뭐야?')">🎯 관성이 뭐야?</button>
      </div>
    </div>
  </div>

  <!-- 입력 -->
  <div class="input-wrap">
    <textarea id="inputBox" rows="1" placeholder="궁금한 걸 물어보세요!" maxlength="1000"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="전송">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const API_KEY = "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";
  const API_URL = "https://api.groq.com/openai/v1/chat/completions";

  const SYSTEM_PROMPT = `너는 중학생 친구에게 설명해주는 똑똑한 선생님이야.

🎯 핵심 원칙 3가지:
1. 정확하게: 틀린 설명은 절대 하지 않는다. 과학적/수학적 사실을 정확히 담는다.
2. 쉽게: 어려운 단어 쓰지 말고, 중학생이 바로 이해할 수 있는 말로 설명한다.
3. 찰떡 비유: 그 개념의 핵심 특징을 가장 잘 보여주는 비유 하나를 골라라.

📌 비유 선택 기준:
- 개념의 핵심 원리와 구조가 같은 걸로 골라라
- 물, 파이프 같은 식상한 비유 말고 중학생 일상에서 딱 공감되는 걸로
- 게임, 음식, 학교생활, 스포츠, SNS, 유튜브 등 요즘 중학생이 아는 것 활용
- 비유가 애매하거나 완벽하지 않으면 쓰지 마라

📋 답변 형식:
- 한 줄 핵심 정의 (정확하게)
- 찰떡 비유 (왜 이 비유인지 연결고리 명확히)
- 진짜 예시 1개 (실제로 어디서 쓰이는지)
- 한 줄 마무리 팁 또는 자주 헷갈리는 점

말투: 친근한 존댓말 (~해요, ~이에요), 이모지 적당히 사용
길이: 너무 길지 않게, 핵심만 딱 짧게`;

  const history = [];

  const chatArea = document.getElementById("chatArea");
  const inputBox = document.getElementById("inputBox");
  const sendBtn  = document.getElementById("sendBtn");

  // 자동 높이 조절
  inputBox.addEventListener("input", () => {
    inputBox.style.height = "auto";
    inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + "px";
  });

  // Enter 전송 (Shift+Enter 줄바꿈)
  inputBox.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function askExample(text) {
    inputBox.value = text;
    sendMessage();
  }

  function appendMsg(role, text) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "ai" ? "🤖" : "😊";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = "msg ai typing";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text) return;

    inputBox.value = "";
    inputBox.style.height = "auto";
    sendBtn.disabled = true;

    appendMsg("user", text);
    history.push({ role: "user", content: text });

    showTyping();

    try {
      const messages = [
        { role: "system", content: SYSTEM_PROMPT },
        ...history
      ];

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: messages,
          temperature: 0.7,
          max_tokens: 1024,
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? "죄송해요, 답변을 가져오지 못했어요.";

      removeTyping();
      appendMsg("ai", reply);
      history.push({ role: "assistant", content: reply });

      // 대화 기록이 너무 길어지면 앞부분 제거 (최근 20턴 유지)
      if (history.length > 40) history.splice(0, 2);

    } catch (err) {
      removeTyping();
      appendMsg("ai", `⚠️ 오류가 발생했어요: ${err.message}\n잠시 후 다시 시도해 주세요.`);
      console.error(err);
    }

    sendBtn.disabled = false;
    inputBox.focus();
  }
</script>
</body>
</html>
