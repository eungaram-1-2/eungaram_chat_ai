<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>eungaram-1-2_GPT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #171717;
      --main-bg:    #212121;
      --input-bg:   #2f2f2f;
      --border:     #3a3a3a;
      --text:       #ececec;
      --muted:      #8e8ea0;
      --accent:     #10a37f;
      --hover:      #2a2a2a;
      --sidebar-w:  260px;
    }

    html, body { height: 100%; }

    body {
      font-family: ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, Arial,
                   'Noto Sans KR', sans-serif;
      background: var(--main-bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    /* ════ SIDEBAR ════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 8px;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 4px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-logo-icon img { width: 32px; height: 32px; border-radius: 8px; }
    .sidebar-logo-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      width: 100%;
      text-align: left;
      transition: background .15s;
    }
    .new-chat-btn:hover { background: var(--hover); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-section-label {
      padding: 12px 12px 4px;
      font-size: 0.71rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .chat-history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s, color .15s;
    }
    .chat-history-item:hover { background: var(--hover); color: var(--text); }
    .chat-history-item.active { background: #2f2f2f; color: var(--text); }

    /* ════ MAIN ════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
    }
    .topbar-model {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #fff;
      cursor: default;
    }
    .topbar-model-badge {
      background: rgba(16,163,127,.18);
      color: #10a37f;
      border: 1px solid rgba(16,163,127,.3);
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 10px;
    }
    .report-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.35);
      border-radius: 8px;
      color: #ff7070;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, border-color .15s, transform .15s;
      font-family: inherit;
    }
    .report-btn:hover {
      background: rgba(255,80,80,0.22);
      border-color: rgba(255,80,80,0.6);
      transform: translateY(-1px);
    }
    @media (max-width: 600px) {
      .report-btn span.report-text { display: none; }
      .report-btn { padding: 7px 10px; }
    }
    .online-dot-wrap {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.76rem; color: var(--muted);
    }
    .online-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: glow 2.2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,163,127,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(16,163,127,0); }
    }

    /* 모바일 사이드바 토글 버튼 */
    .sidebar-toggle {
      display: none;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 6px; border-radius: 6px;
      min-width: 44px; min-height: 44px;
      align-items: center; justify-content: center;
      transition: color .15s, background .15s;
      touch-action: manipulation;
    }
    .sidebar-toggle:hover { color: var(--text); background: var(--hover); }

    /* ════ CHAT AREA ════ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 3px; }

    /* ── 웰컴 ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px - 140px);
      padding: 32px 20px;
      gap: 0;
    }
    .welcome-logo {
      width: 52px; height: 52px;
      background: #fff;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 18px rgba(0,0,0,.3);
    }
    .welcome-logo img { width: 40px; height: 40px; border-radius: 8px; }
    .welcome h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      text-align: center;
    }
    .examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 580px;
    }
    .ex-btn {
      background: #2f2f2f;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .ex-btn:hover { background: #363636; border-color: #4a4a4a; transform: translateY(-1px); }
    .ex-btn:active { transform: translateY(0); }
    .ex-t { font-weight: 600; font-size: 0.86rem; margin-bottom: 3px; }
    .ex-s { color: var(--muted); font-size: 0.75rem; }

    /* ── 메시지 행 ── */
    .msg-row { width: 100%; }
    .msg-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 24px;
    }

    /* 사용자 */
    .msg-row.user .msg-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .user-bubble {
      background: #2f2f2f;
      color: var(--text);
      border-radius: 20px;
      padding: 12px 18px;
      max-width: 72%;
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .user-file-preview {
      max-width: 72%;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f2f2f;
      border: 1px solid #404040;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .user-file-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      object-fit: cover;
    }
    .user-file-icon { font-size: 1.4rem; flex-shrink: 0; }

    /* AI */
    .msg-row.ai .msg-inner {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .ai-icon {
      width: 30px; height: 30px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ai-icon img { width: 28px; height: 28px; border-radius: 6px; }
    .ai-body { flex: 1; min-width: 0; }

    /* ── 마크다운 ── */
    .md {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      word-break: break-word;
    }
    .md h1,.md h2,.md h3 { color: #fff; font-weight: 700; margin: 20px 0 9px; line-height: 1.3; }
    .md h1 { font-size: 1.3rem; }
    .md h2 { font-size: 1.14rem; }
    .md h3 { font-size: 1.02rem; }
    .md p  { margin: 9px 0; }
    .md p:first-child { margin-top: 0; }
    .md p:last-child  { margin-bottom: 0; }
    .md strong { color: #fff; font-weight: 700; }
    .md em     { font-style: italic; color: #c5c5d2; }
    .md del    { text-decoration: line-through; color: var(--muted); }
    .md ul, .md ol { padding-left: 22px; margin: 10px 0; }
    .md li { margin: 6px 0; line-height: 1.7; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px; margin: 12px 0;
      color: var(--muted); font-style: italic;
    }
    .md hr { border: none; border-top: 1px solid #333; margin: 18px 0; }
    .md code {
      background: #1e1e2e; color: #e2b96a;
      padding: 2px 6px; border-radius: 5px;
      font-family: 'Consolas','Monaco','Courier New',monospace;
      font-size: 0.87em;
    }
    .md .code-block { margin: 14px 0; border-radius: 10px; overflow: hidden; border: 1px solid #2f2f3a; }
    .md .code-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 14px; background: #161622;
      font-size: 0.76rem; color: var(--muted);
    }
    .md .copy-code {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.76rem; padding: 2px 8px; border-radius: 4px; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .md .copy-code:hover { color: var(--text); background: #2a2a3a; }
    .md pre { background: #1a1a2e; padding: 14px 16px; overflow-x: auto; margin: 0; }
    .md pre code { background: none; color: #abb2bf; padding: 0; font-size: 0.87rem; border-radius: 0; }

    /* 액션 버튼 */
    .ai-actions {
      display: flex; gap: 4px;
      margin-top: 10px;
      opacity: 0; transition: opacity .2s;
    }
    .msg-row:hover .ai-actions { opacity: 1; }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.77rem; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .act-btn:hover { color: var(--text); background: #2f2f2f; }

    /* 타이핑 인디케이터 */
    .typing { display: flex; gap: 5px; align-items: center; height: 24px; }
    .typing span {
      width: 6px; height: 6px; background: var(--muted);
      border-radius: 50%; animation: tdot 1.3s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }
    .scursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--text); margin-left: 1px;
      animation: blink .65s infinite; vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ════ INPUT SECTION ════ */
    .input-section {
      flex-shrink: 0;
      padding: 8px 20px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
    }

    /* 파일 첨부 미리보기 (비활성화)
    .file-preview-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 6px;
      background: #2f2f2f;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .file-preview-bar.visible { display: flex; }
    .file-preview-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name {
      font-size: 0.83rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview-size { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .file-preview-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px;
      font-size: 1rem; line-height: 1;
      transition: color .15s, background .15s;
    }
    .file-preview-remove:hover { color: #f87171; background: rgba(248,113,113,.1); }
    */

    .input-box {
      background: var(--input-bg);
      border: 1px solid #404040;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      padding: 12px 14px 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,.2);
      box-shadow: 0 0 0 1px rgba(255,255,255,.07);
    }
    textarea {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 0.95rem; resize: none;
      max-height: 180px; line-height: 1.6; width: 100%;
      -webkit-appearance: none;
    }
    textarea::placeholder { color: #666; }
    @media (max-width: 768px) {
      textarea { font-size: 16px; }
    }

    .input-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .input-left-btns { display: flex; gap: 4px; align-items: center; }

    /* 파일 첨부 버튼 (비활성화)
    .attach-btn {
      width: 34px; height: 34px;
      background: none; border: 1px solid #505050;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .attach-btn:hover { background: #363636; color: var(--text); border-color: #666; }
    .attach-btn svg { width: 16px; height: 16px; }
    */

    /* 전송 버튼 */
    .send-btn {
      width: 34px; height: 34px;
      background: #fff; border: none;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:hover   { background: #e8e8e8; }
    .send-btn:active  { background: #d0d0d0; }
    .send-btn:disabled { background: #3a3a3a; cursor: default; }
    .send-btn svg { width: 16px; height: 16px; }
    .send-btn svg path { fill: #212121; }
    .send-btn:disabled svg path { fill: #666; }
    @media (max-width: 768px) {
      .send-btn { width: 40px; height: 40px; border-radius: 12px; }
    }

    .input-notice {
      text-align: center; font-size: 0.71rem;
      color: #555; margin-top: 9px;
    }

    /* 숨겨진 파일 입력 (비활성화)
    #fileInput { display: none; }
    */

    /* ════ MOBILE ════ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: -260px; top: 0; bottom: 0;
        top: env(safe-area-inset-top, 0);
        z-index: 200;
        transition: left .25s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,.4);
      }
      .sidebar.open { left: 0; }
      .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 199;
      }
      .sidebar-overlay.visible { display: block; }
      .sidebar-toggle { display: flex; }
      .topbar {
        border-bottom: 1px solid var(--border);
        padding-top: max(12px, env(safe-area-inset-top));
      }
      .new-chat-btn { min-height: 44px; }
      .chat-history-item { min-height: 40px; padding: 10px 12px; }
      .ex-btn { padding: 16px; }
      .act-btn { min-height: 36px; min-width: 36px; }
    }
    @media (max-width: 600px) {
      .msg-inner { padding: 12px 12px; }
      .examples  { grid-template-columns: 1fr; max-width: 100%; }
      .welcome { padding: 24px 16px; gap: 0; min-height: calc(100dvh - 58px - 140px); }
      .welcome h2 { font-size: 1.45rem; }
      .input-section {
        padding: 6px 12px 12px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
      .input-box { border-radius: 16px; padding: 10px 12px 8px; }
      .user-bubble { max-width: 88%; font-size: 0.93rem; }
      .ai-actions { opacity: 1; }
      .topbar-model-badge { display: none; }
      .online-dot-wrap { display: none; }
      .input-notice { font-size: 0.68rem; margin-top: 6px; }
    }
  </style>
</head>
<body>

<!-- 모바일 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <img src="eungaram-1-2_GPT_logo.png" alt="로고">
    </div>
    <span class="sidebar-logo-name">eungaram-1-2_GPT</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
    </svg>
    새 채팅
  </button>

  <div class="sidebar-section-label">오늘</div>
  <div id="chatHistoryList"></div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
  <!-- 상단 헤더 -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="사이드바">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <div class="topbar-model">
        eungaram-1-2_GPT
        <span class="topbar-model-badge">PRO</span>
      </div>
    </div>
    <div class="topbar-right">
      <a class="report-btn" href="https://open.kakao.com/o/sQsGreji" target="_blank" rel="noopener noreferrer" title="오류 신고">
        ⚠️ <span class="report-text">오류가 생길시 이 버튼을 눌러 여기로 보내주세요!</span>
      </a>
      <div class="online-dot-wrap">
        <div class="online-dot"></div>
        온라인
      </div>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <img src="eungaram-1-2_GPT_logo.png" alt="로고">
      </div>

/* ── 이상한 문자 자동 제거 ── */
function sanitize(text) {
  return text
    .replace(/[\u4E00-\u9FFF\u3400-\u4DBF]/g, "")
    .replace(/[\u0400-\u04FF]/g, "")
    .replace(/[\u3040-\u309F\u30A0-\u30FF]/g, "")
    .replace(/[\u0600-\u06FF\u0E00-\u0E7F]/g, "")
    .replace(/\(\s*\)/g, "")
    .replace(/[ \t]{3,}/g, "  ")
    .trim();
}

/* ── HTML 이스케이프 ── */
function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── 인라인 포맷 ── */
function inlineFmt(s) {
  return s
    .replace(/\*\*\*([^*\n]+)\*\*\*/g, "<strong><em>$1</em></strong>")
    .replace(/\*\*([^*\n]+)\*\*/g,     "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g,         "<em>$1</em>")
    .replace(/~~([^~\n]+)~~/g,         "<del>$1</del>");
}

/* ── 마크다운 파서 ── */
function renderMD(md) {
  const codeBlocks = [];
  let t = md.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang: lang.trim() || "code", code: code.trim() });
    return `\x00CB${codeBlocks.length - 1}\x00`;
  });
  const inlines = [];
  t = t.replace(/`([^`\n]+)`/g, (_, c) => {
    inlines.push(c);
    return `\x00IC${inlines.length - 1}\x00`;
  });

  // LaTeX 수식 보호 (esc()에 의해 깨지지 않도록 먼저 추출)
  const mathBlocks = [];
  // \[...\] 블록 수식
  t = t.replace(/\\\[([\s\S]*?)\\\]/g, (_, math) => {
    mathBlocks.push({ display: true, content: math });
    return `\x00MT${mathBlocks.length - 1}\x00`;
  });
  // \(...\) 인라인 수식
  t = t.replace(/\\\(([^\)]*?)\\\)/g, (_, math) => {
    mathBlocks.push({ display: false, content: math });
    return `\x00MT${mathBlocks.length - 1}\x00`;
  });
  // $$...$$ 블록 수식
  t = t.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
    mathBlocks.push({ display: true, content: math });
    return `\x00MT${mathBlocks.length - 1}\x00`;
  });
  // $...$ 인라인 수식
  t = t.replace(/\$([^$\n]+)\$/g, (_, math) => {
    mathBlocks.push({ display: false, content: math });
    return `\x00MT${mathBlocks.length - 1}\x00`;
  });
  const lines = t.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const raw  = lines[i];
    const trim = raw.trim();
    if (!trim) { out.push(""); i++; continue; }
    if (trim.includes("\x00CB")) { out.push(trim); i++; continue; }
    const hm = trim.match(/^(#{1,3})\s+(.+)/);
    if (hm) { const lv = hm[1].length; out.push(`<h${lv}>${inlineFmt(esc(hm[2]))}</h${lv}>`); i++; continue; }
    if (/^---+$/.test(trim)) { out.push("<hr>"); i++; continue; }
    if (trim.startsWith("> ")) { out.push(`<blockquote>${inlineFmt(esc(trim.slice(2)))}</blockquote>`); i++; continue; }
    if (/^[-*+]\s/.test(trim)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s/.test(lines[i].trim())) {
        items.push(`<li>${inlineFmt(esc(lines[i].trim().replace(/^[-*+]\s/, "")))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join("")}</ul>`);
      continue;
    }
    if (/^(\d+\.|\.)[ \t]/.test(trim)) {
      const items = [];
      while (i < lines.length && /^(\d+\.|\.)[ \t]/.test(lines[i].trim())) {
        const text = lines[i].trim().replace(/^(\d+\.|\.)[ \t]/, "");
        items.push(`<li>${inlineFmt(esc(text))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join("")}</ol>`);
      continue;
    }
    out.push(`<p>${inlineFmt(esc(trim))}</p>`);
    i++;
  }
  let html = out.join("\n");
  html = html.replace(/\x00IC(\d+)\x00/g, (_, idx) => `<code>${esc(inlines[+idx])}</code>`);
  // LaTeX 수식 복원 (원본 그대로, 이스케이프 없이)
  html = html.replace(/\x00MT(\d+)\x00/g, (_, idx) => {
    const { display, content } = mathBlocks[+idx];
    return display ? `$$${content}$$` : `$${content}$`;
  });
  html = html.replace(/\x00CB(\d+)\x00/g, (_, idx) => {
    const { lang, code } = codeBlocks[+idx];
    return `<div class="code-block">` +
      `<div class="code-head"><span>${esc(lang)}</span>` +
      `<button class="copy-code" data-code="${encodeURIComponent(code)}">복사</button></div>` +
      `<pre><code>${esc(code)}</code></pre></div>`;
  });
  return html;
}

      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> 복사됨`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사`;
      }, 2200);
    });
  });
  div.appendChild(btn);
  aiBody.appendChild(div);
}

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text) return;
  if (sendBtn.disabled) return;

  inputBox.value = "";
  inputBox.style.height = "auto";
  sendBtn.disabled = true;

  appendUser(text, null);

  const row = createAiRow();
  const mdDiv = row.querySelector(".md");
  const aiBody = row.querySelector(".ai-body");

  // Worker API 설정
  const WORKER_URL = "https://eungaram-proxy.msangji170.workers.dev/api/chat";

  if (history.length === 0) {
    addToHistory(text.slice(0, 36) + (text.length > 36 ? '…' : ''));
  }

  history.push({ role: "user", content: text });

  let full = "";
  let started = false;

  try {
    const messages = [
      { role: "system", content: SYSTEM_PROMPT },
      ...history.slice(-8)
    ];

    const requestPayload = {
      messages: messages,
      temperature: 0.7,
      top_p: 0.9,
      max_tokens: 1500,
      stream: true
    };

    console.log('FETCH_REQUEST:', {
      url: WORKER_URL,
      method: 'POST',
      payload: requestPayload
    });

    // Worker API 호출 (스트리밍)
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestPayload)
    });

    console.log('HTTP_RESPONSE:', {
      status: response.status,
      statusText: response.statusText,
      ok: response.ok
    });

    if (!response.ok) {
      const errorData = await response.json();
      console.error('HTTP_ERROR:', {
        status: response.status,
        error: errorData.error || 'Unknown error'
      });
      throw new Error(errorData.error || `HTTP ${response.status}`);
    }

    // SSE 스트리밍 파싱 (버퍼링으로 청크 경계 문제 해결)
    const reader = response.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buffer = "";
    let chunkCount = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) {
        console.log('STREAM_END:', { totalChunks: chunkCount });
        break;
      }

      chunkCount++;
      const decodedChunk = decoder.decode(value, { stream: true });
      console.log(`STREAM_CHUNK_${chunkCount}:`, decodedChunk);

      buffer += decodedChunk;
      const lines = buffer.split("\n");
      // 마지막 불완전한 줄은 버퍼에 남겨둠
      buffer = lines.pop() ?? "";

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;

        const jsonStr = line.slice(6).trim();
        if (jsonStr === "[DONE]") {
          console.log('STREAM_MARKER: [DONE] received');
          continue;
        }

        try {
          const data = JSON.parse(jsonStr);
          console.log('JSON_PARSE:', data);
          const content = data.choices?.[0]?.delta?.content;

          if (content) {
            console.log('CONTENT_RECEIVED:', { text: content, accumulated: full + content });
            if (!started) {
              mdDiv.innerHTML = "";
              started = true;
            }
            full += content;
            mdDiv.textContent = full;
            const cur = document.createElement("span");
            cur.className = "scursor";
            mdDiv.appendChild(cur);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch (e) {
          console.error('JSON_PARSE_ERROR:', { jsonStr: jsonStr, error: e.message });
        }
      }
    }

    if (full) {
      full = sanitize(full);
      mdDiv.innerHTML = renderMD(full);
      if (window.renderMathInElement) {
        renderMathInElement(mdDiv, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\[', right: '\\]', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      }
      addActionBtn(aiBody, full);
    } else {
      mdDiv.innerHTML = "<p>⚠️ 응답 오류. 다시 시도해주세요.</p>";
    }

    console.log('FINAL_RESPONSE:', {
      fullLength: full.length,
      content: full.slice(0, 200) + (full.length > 200 ? '...' : '')
    });

    history.push({ role: "assistant", content: full });
    if (history.length > 40) history.splice(0, 2);

    const session = chatHistories.find(s => s.id === currentChatId);
    if (session) { session.messages = [...history]; _saveAllSessions(); }

  } catch (err) {
    console.error('CATCH_ERROR:', {
      message: err.message,
      stack: err.stack
    });
    mdDiv.innerHTML = `<p style="color:#f87171">⚠️ <strong>오류:</strong> ${esc(err.message)}</p>`;
  }

  sendBtn.disabled = false;
  chatArea.scrollTop = chatArea.scrollHeight;
  inputBox.focus();
}

// 페이지 로드 시 저장된 세션 목록 표시
renderSidebar();

/* ── 모바일 가상 키보드 대응 ── */
if (typeof window !== 'undefined' && window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const main = document.querySelector('.main');
    if (!main) return;
    const vvHeight = window.visualViewport.height;
    const windowHeight = window.innerHeight;
    const keyboardHeight = windowHeight - vvHeight;
    if (keyboardHeight > 100) {
      main.style.height = vvHeight + 'px';
    } else {
      main.style.height = '';
    }
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

/* ── 사이드바 토글 ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}
