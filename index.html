<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eungaram-1-2_GPT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #171717;
      --main-bg:    #212121;
      --input-bg:   #2f2f2f;
      --border:     #3a3a3a;
      --text:       #ececec;
      --muted:      #8e8ea0;
      --accent:     #10a37f;
      --hover:      #2a2a2a;
      --sidebar-w:  260px;
    }

    html, body { height: 100%; }

    body {
      font-family: ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, Arial,
                   'Noto Sans KR', sans-serif;
      background: var(--main-bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ════ SIDEBAR ════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 8px;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 4px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-logo-icon img { width: 32px; height: 32px; border-radius: 8px; }
    .sidebar-logo-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      width: 100%;
      text-align: left;
      transition: background .15s;
    }
    .new-chat-btn:hover { background: var(--hover); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-section-label {
      padding: 12px 12px 4px;
      font-size: 0.71rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .chat-history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .15s, color .15s;
    }
    .chat-history-item:hover { background: var(--hover); color: var(--text); }
    .chat-history-item.active { background: #2f2f2f; color: var(--text); }

    /* ════ MAIN ════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
    }
    .topbar-model {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #fff;
      cursor: default;
    }
    .topbar-model-badge {
      background: rgba(16,163,127,.18);
      color: #10a37f;
      border: 1px solid rgba(16,163,127,.3);
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 8px;
    }
    .online-dot-wrap {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.76rem; color: var(--muted);
    }
    .online-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: glow 2.2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,163,127,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(16,163,127,0); }
    }

    /* 모바일 사이드바 토글 버튼 */
    .sidebar-toggle {
      display: none;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 6px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .sidebar-toggle:hover { color: var(--text); background: var(--hover); }

    /* ════ CHAT AREA ════ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 3px; }

    /* ── 웰컴 ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px - 140px);
      padding: 32px 20px;
      gap: 0;
    }
    .welcome-logo {
      width: 52px; height: 52px;
      background: #fff;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 18px rgba(0,0,0,.3);
    }
    .welcome-logo img { width: 40px; height: 40px; border-radius: 8px; }
    .welcome h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      text-align: center;
    }
    .examples {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 580px;
    }
    .ex-btn {
      background: #2f2f2f;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .ex-btn:hover { background: #363636; border-color: #4a4a4a; transform: translateY(-1px); }
    .ex-btn:active { transform: translateY(0); }
    .ex-t { font-weight: 600; font-size: 0.86rem; margin-bottom: 3px; }
    .ex-s { color: var(--muted); font-size: 0.75rem; }

    /* ── 메시지 행 ── */
    .msg-row { width: 100%; }
    .msg-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 24px;
    }

    /* 사용자 */
    .msg-row.user .msg-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .user-bubble {
      background: #2f2f2f;
      color: var(--text);
      border-radius: 20px;
      padding: 12px 18px;
      max-width: 72%;
      font-size: 0.95rem;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .user-file-preview {
      max-width: 72%;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f2f2f;
      border: 1px solid #404040;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .user-file-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      object-fit: cover;
    }
    .user-file-icon { font-size: 1.4rem; flex-shrink: 0; }

    /* AI */
    .msg-row.ai .msg-inner {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .ai-icon {
      width: 30px; height: 30px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ai-icon img { width: 28px; height: 28px; border-radius: 6px; }
    .ai-body { flex: 1; min-width: 0; }

    /* ── 마크다운 ── */
    .md {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      word-break: break-word;
    }
    .md h1,.md h2,.md h3 { color: #fff; font-weight: 700; margin: 20px 0 9px; line-height: 1.3; }
    .md h1 { font-size: 1.3rem; }
    .md h2 { font-size: 1.14rem; }
    .md h3 { font-size: 1.02rem; }
    .md p  { margin: 9px 0; }
    .md p:first-child { margin-top: 0; }
    .md p:last-child  { margin-bottom: 0; }
    .md strong { color: #fff; font-weight: 700; }
    .md em     { font-style: italic; color: #c5c5d2; }
    .md del    { text-decoration: line-through; color: var(--muted); }
    .md ul, .md ol { padding-left: 22px; margin: 10px 0; }
    .md li { margin: 6px 0; line-height: 1.7; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px; margin: 12px 0;
      color: var(--muted); font-style: italic;
    }
    .md hr { border: none; border-top: 1px solid #333; margin: 18px 0; }
    .md code {
      background: #1e1e2e; color: #e2b96a;
      padding: 2px 6px; border-radius: 5px;
      font-family: 'Consolas','Monaco','Courier New',monospace;
      font-size: 0.87em;
    }
    .md .code-block { margin: 14px 0; border-radius: 10px; overflow: hidden; border: 1px solid #2f2f3a; }
    .md .code-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 14px; background: #161622;
      font-size: 0.76rem; color: var(--muted);
    }
    .md .copy-code {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.76rem; padding: 2px 8px; border-radius: 4px; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .md .copy-code:hover { color: var(--text); background: #2a2a3a; }
    .md pre { background: #1a1a2e; padding: 14px 16px; overflow-x: auto; margin: 0; }
    .md pre code { background: none; color: #abb2bf; padding: 0; font-size: 0.87rem; border-radius: 0; }

    /* 액션 버튼 */
    .ai-actions {
      display: flex; gap: 4px;
      margin-top: 10px;
      opacity: 0; transition: opacity .2s;
    }
    .msg-row:hover .ai-actions { opacity: 1; }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.77rem; font-family: inherit;
      transition: color .15s, background .15s;
    }
    .act-btn:hover { color: var(--text); background: #2f2f2f; }

    /* 타이핑 인디케이터 */
    .typing { display: flex; gap: 5px; align-items: center; height: 24px; }
    .typing span {
      width: 6px; height: 6px; background: var(--muted);
      border-radius: 50%; animation: tdot 1.3s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }
    .scursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--text); margin-left: 1px;
      animation: blink .65s infinite; vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ════ INPUT SECTION ════ */
    .input-section {
      flex-shrink: 0;
      padding: 8px 20px 16px;
    }
    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
    }

    /* 파일 첨부 미리보기 */
    .file-preview-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 6px;
      background: #2f2f2f;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .file-preview-bar.visible { display: flex; }
    .file-preview-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name {
      font-size: 0.83rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview-size { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .file-preview-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px;
      font-size: 1rem; line-height: 1;
      transition: color .15s, background .15s;
    }
    .file-preview-remove:hover { color: #f87171; background: rgba(248,113,113,.1); }

    .input-box {
      background: var(--input-bg);
      border: 1px solid #404040;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      padding: 12px 14px 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(255,255,255,.2);
      box-shadow: 0 0 0 1px rgba(255,255,255,.07);
    }
    textarea {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 0.95rem; resize: none;
      max-height: 180px; line-height: 1.6; width: 100%;
    }
    textarea::placeholder { color: #666; }

    .input-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .input-left-btns { display: flex; gap: 4px; align-items: center; }

    /* 파일 첨부 버튼 */
    .attach-btn {
      width: 34px; height: 34px;
      background: none; border: 1px solid #505050;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .attach-btn:hover { background: #363636; color: var(--text); border-color: #666; }
    .attach-btn svg { width: 16px; height: 16px; }

    /* 전송 버튼 */
    .send-btn {
      width: 34px; height: 34px;
      background: #fff; border: none;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .send-btn:hover   { background: #e8e8e8; }
    .send-btn:active  { background: #d0d0d0; }
    .send-btn:disabled { background: #3a3a3a; cursor: default; }
    .send-btn svg { width: 16px; height: 16px; }
    .send-btn svg path { fill: #212121; }
    .send-btn:disabled svg path { fill: #666; }

    .input-notice {
      text-align: center; font-size: 0.71rem;
      color: #555; margin-top: 9px;
    }

    /* 숨겨진 파일 입력 */
    #fileInput { display: none; }

    /* ════ MOBILE ════ */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: -260px; top: 0; bottom: 0;
        z-index: 200;
        transition: left .25s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,.4);
      }
      .sidebar.open { left: 0; }
      .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 199;
      }
      .sidebar-overlay.visible { display: block; }
      .sidebar-toggle { display: flex; }
      .topbar { border-bottom: 1px solid var(--border); }
    }
    @media (max-width: 600px) {
      .msg-inner { padding: 14px 13px; }
      .examples  { grid-template-columns: 1fr; max-width: 100%; }
      .welcome h2 { font-size: 1.55rem; }
      .input-section { padding: 8px 13px 14px; }
      .user-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- 모바일 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <img src="eungaram-1-2_GPT_logo.png" alt="로고">
    </div>
    <span class="sidebar-logo-name">eungaram-1-2_GPT</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
    </svg>
    새 채팅
  </button>

  <div class="sidebar-section-label">오늘</div>
  <div id="chatHistoryList"></div>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">
  <!-- 상단 헤더 -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="사이드바">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <div class="topbar-model">
        eungaram-1-2_GPT
        <span class="topbar-model-badge">PRO</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="online-dot-wrap">
        <div class="online-dot"></div>
        온라인
      </div>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <img src="eungaram-1-2_GPT_logo.png" alt="로고">
      </div>
      <h2>무엇을 도와드릴까요?</h2>
      <div class="examples">
        <button class="ex-btn" onclick="askExample('전류가 뭐야? 중학생한테 쉽게 설명해줘')">
          <div class="ex-t">⚡ 전류란?</div>
          <div class="ex-s">전기의 흐름을 쉽게 설명해줘</div>
        </button>
        <button class="ex-btn" onclick="askExample('원소와 분자의 차이는?')">
          <div class="ex-t">🔬 원소 vs 분자</div>
          <div class="ex-s">화학 개념 차이를 알려줘</div>
        </button>
        <button class="ex-btn" onclick="askExample('수학에서 함수가 뭐야? 비유로 설명해줘')">
          <div class="ex-t">📐 함수란?</div>
          <div class="ex-s">수학 함수 개념을 비유로</div>
        </button>
        <button class="ex-btn" onclick="askExample('광합성이 뭐야? 쉽게 설명해줘')">
          <div class="ex-t">🌱 광합성</div>
          <div class="ex-s">식물이 에너지 만드는 방법</div>
        </button>
      </div>
    </div>
  </div>

  <!-- 입력 -->
  <div class="input-section">
    <div class="input-wrapper">
      <!-- 파일 첨부 미리보기 -->
      <div class="file-preview-bar" id="filePreviewBar">
        <img src="" alt="미리보기" class="file-preview-thumb" id="filePrevThumb" style="display:none"/>
        <span class="file-preview-info">
          <div class="file-preview-name" id="filePrevName"></div>
          <div class="file-preview-size" id="filePrevSize"></div>
        </span>
        <button class="file-preview-remove" onclick="removeAttachment()" title="첨부 파일 제거">✕</button>
      </div>

      <div class="input-box">
        <textarea id="inputBox" rows="1" placeholder="eungaram-1-2_GPT에게 메시지 보내기" maxlength="4000"></textarea>
        <div class="input-footer-row">
          <div class="input-left-btns">
            <!-- 파일 첨부 버튼 -->
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="파일 첨부">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <input type="file" id="fileInput" accept="image/*,.txt,.md,.csv,.js,.py,.html,.css,.json" onchange="handleFileAttach(this)">
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="전송 (Enter)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <div class="input-notice">eungaram-1-2_GPT는 가끔 틀릴 수 있어요. 중요한 내용은 꼭 확인하세요.</div>
    </div>
  </div>
</div>

<script>
const API_KEY = "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";
const API_URL = "https://api.groq.com/openai/v1/chat/completions";

/* ── 시스템 프롬프트 ── */
const SYSTEM_PROMPT = `MANDATORY LANGUAGE RULE:
- You MUST write ONLY in Korean (한국어). Every character must be Korean, Arabic numerals, or standard ASCII.
- ABSOLUTELY FORBIDDEN: Chinese characters (呼吸,運動,漢字…), Cyrillic (а,б,в…), Japanese (hiragana/katakana), Arabic, Thai, or any non-Korean/non-ASCII script.
- Foreign technical terms must be written in Korean phonetics: benzene→벤젠, oxygen→산소, glucose→포도당, electron→전자.

MANDATORY FORMAT RULE:
- For numbered lists, ALWAYS use "1.", "2.", "3." format — never use ". " alone.
- For bullet lists, ALWAYS use "- " prefix.
- Use markdown: **굵게**, *기울임*, ## 제목, - 목록, 1. 번호목록.

---
너는 중학생을 위한 친절하고 정확한 AI 선생님이야.

핵심 원칙:
1. **정확성 최우선**: 과학적·수학적으로 검증된 사실만 말한다. 틀린 설명은 절대 하지 않는다.
2. **쉬운 한국어**: 중학생이 바로 이해할 수 있는 순수 한국어로 설명한다.
3. **체계적 구성**: 마크다운으로 읽기 편하게 정리한다.

답변 구조 (이 순서를 지킨다):

2. **비유/예시** — 중학생 일상과 연결된 구체적 예시 1개
3. **과정/원리** — 번호 목록(1. 2. 3.)으로 단계별 설명 (필요할 때)
4. **헷갈리는 점** — 자주 오해하는 내용 짚어주기

말투: 친근한 존댓말(~해요, ~이에요), 이모지 적당히
길이: 핵심만 담아 적당히 (너무 길지 않게)`;

/* ── 파일 첨부 상태 ── */
let attachedFile = null;   // { name, size, content, type, dataUrl }

function handleFileAttach(input) {
  const file = input.files[0];
  if (!file) return;

  const bar     = document.getElementById('filePreviewBar');
  const thumb   = document.getElementById('filePrevThumb');
  const nameEl  = document.getElementById('filePrevName');
  const sizeEl  = document.getElementById('filePrevSize');

  nameEl.textContent = file.name;
  sizeEl.textContent = formatFileSize(file.size);
  bar.classList.add('visible');

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      attachedFile = { name: file.name, size: file.size, type: 'image', dataUrl: e.target.result };
      thumb.src = e.target.result;
      thumb.style.display = 'block';
    };
    reader.readAsDataURL(file);
  } else {
    thumb.style.display = 'none';
    const reader = new FileReader();
    reader.onload = e => {
      attachedFile = { name: file.name, size: file.size, type: 'text', content: e.target.result };
    };
    reader.readAsText(file, 'UTF-8');
  }
  input.value = '';
}

function removeAttachment() {
  attachedFile = null;
  document.getElementById('filePreviewBar').classList.remove('visible');
  document.getElementById('filePrevThumb').style.display = 'none';
  document.getElementById('filePrevThumb').src = '';
  document.getElementById('filePrevName').textContent = '';
  document.getElementById('filePrevSize').textContent = '';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

/* ── 이상한 문자 자동 제거 ── */
function sanitize(text) {
  return text
    .replace(/[\u4E00-\u9FFF\u3400-\u4DBF]/g, "")
    .replace(/[\u0400-\u04FF]/g, "")
    .replace(/[\u3040-\u309F\u30A0-\u30FF]/g, "")
    .replace(/[\u0600-\u06FF\u0E00-\u0E7F]/g, "")
    .replace(/\(\s*\)/g, "")
    .replace(/[ \t]{3,}/g, "  ")
    .trim();
}

/* ── HTML 이스케이프 ── */
function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── 인라인 포맷 ── */
function inlineFmt(s) {
  return s
    .replace(/\*\*\*([^*\n]+)\*\*\*/g, "<strong><em>$1</em></strong>")
    .replace(/\*\*([^*\n]+)\*\*/g,     "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g,         "<em>$1</em>")
    .replace(/~~([^~\n]+)~~/g,         "<del>$1</del>");
}

/* ── 마크다운 파서 ── */
function renderMD(md) {
  const codeBlocks = [];
  let t = md.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang: lang.trim() || "code", code: code.trim() });
    return `\x00CB${codeBlocks.length - 1}\x00`;
  });
  const inlines = [];
  t = t.replace(/`([^`\n]+)`/g, (_, c) => {
    inlines.push(c);
    return `\x00IC${inlines.length - 1}\x00`;
  });
  const lines = t.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const raw  = lines[i];
    const trim = raw.trim();
    if (!trim) { out.push(""); i++; continue; }
    if (trim.includes("\x00CB")) { out.push(trim); i++; continue; }
    const hm = trim.match(/^(#{1,3})\s+(.+)/);
    if (hm) { const lv = hm[1].length; out.push(`<h${lv}>${inlineFmt(esc(hm[2]))}</h${lv}>`); i++; continue; }
    if (/^---+$/.test(trim)) { out.push("<hr>"); i++; continue; }
    if (trim.startsWith("> ")) { out.push(`<blockquote>${inlineFmt(esc(trim.slice(2)))}</blockquote>`); i++; continue; }
    if (/^[-*+]\s/.test(trim)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s/.test(lines[i].trim())) {
        items.push(`<li>${inlineFmt(esc(lines[i].trim().replace(/^[-*+]\s/, "")))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join("")}</ul>`);
      continue;
    }
    if (/^(\d+\.|\.)[ \t]/.test(trim)) {
      const items = [];
      while (i < lines.length && /^(\d+\.|\.)[ \t]/.test(lines[i].trim())) {
        const text = lines[i].trim().replace(/^(\d+\.|\.)[ \t]/, "");
        items.push(`<li>${inlineFmt(esc(text))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join("")}</ol>`);
      continue;
    }
    out.push(`<p>${inlineFmt(esc(trim))}</p>`);
    i++;
  }
  let html = out.join("\n");
  html = html.replace(/\x00IC(\d+)\x00/g, (_, idx) => `<code>${esc(inlines[+idx])}</code>`);
  html = html.replace(/\x00CB(\d+)\x00/g, (_, idx) => {
    const { lang, code } = codeBlocks[+idx];
    return `<div class="code-block">` +
      `<div class="code-head"><span>${esc(lang)}</span>` +
      `<button class="copy-code" data-code="${encodeURIComponent(code)}">복사</button></div>` +
      `<pre><code>${esc(code)}</code></pre></div>`;
  });
  return html;
}

/* ── 코드블록 복사 ── */
document.getElementById("chatArea").addEventListener("click", e => {
  const btn = e.target.closest(".copy-code");

    btn.textContent = "복사됨 ✓";
    setTimeout(() => btn.textContent = "복사", 1800);
  });
});

/* ── 상태 ── */
const history = [];
const chatArea = document.getElementById("chatArea");
const inputBox = document.getElementById("inputBox");
const sendBtn  = document.getElementById("sendBtn");

inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 180) + "px";
});
inputBox.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function askExample(text) {
  inputBox.value = text;
  inputBox.dispatchEvent(new Event("input"));
  sendMessage();
}

/* ── 채팅 기록 사이드바 ── */
const chatHistories = [];   // { id, title, messages }
let currentChatId = null;

function newChat() {
  history.length = 0;
  attachedFile = null;
  document.getElementById('filePreviewBar').classList.remove('visible');
  chatArea.innerHTML = '';
  chatArea.insertAdjacentHTML('beforeend', `
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <img src="eungaram-1-2_GPT_logo.png" alt="로고">
      </div>
      <h2>무엇을 도와드릴까요?</h2>
      <div class="examples">
        <button class="ex-btn" onclick="askExample('전류가 뭐야? 중학생한테 쉽게 설명해줘')">

function addToHistory(title) {
  const id = Date.now();
  currentChatId = id;
  const item = document.createElement('div');
  item.className = 'chat-history-item active';

}

/* ── 메시지 생성 ── */
function appendUser(text, file) {
  document.getElementById("welcome")?.remove();
  const row = document.createElement("div");
  row.className = "msg-row user";

  let fileHtml = '';
  if (file) {
    if (file.type === 'image') {
      fileHtml = `<div class="user-file-preview"><img src="${file.dataUrl}" style="max-width:200px;max-height:150px;border-radius:8px" alt="${esc(file.name)}"></div>`;
    } else {
      fileHtml = `<div class="user-file-preview"><span class="user-file-icon">📄</span><div><div style="font-size:.83rem;font-weight:600">${esc(file.name)}</div><div style="font-size:.72rem;color:var(--muted)">${formatFileSize(file.size)}</div></div></div>`;
    }
  }

  row.innerHTML = `<div class="msg-inner">${fileHtml}<div class="user-bubble"></div></div>`;
  row.querySelector(".user-bubble").textContent = text;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function createAiRow() {
  document.getElementById("welcome")?.remove();
  const row = document.createElement("div");
  row.className = "msg-row ai";
  row.innerHTML = `
    <div class="msg-inner">
      <div class="ai-icon">
        <img src="eungaram-1-2_GPT_logo.png" alt="AI">
      </div>

      </div>

function addActionBtn(aiBody, fullText) {
  const div = document.createElement("div");
  div.className = "ai-actions";
  const btn = document.createElement("button");
  btn.className = "act-btn";
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사`;
  btn.addEventListener("click", () => {
    navigator.clipboard.writeText(fullText).then(() => {
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> 복사됨`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> 복사`;
      }, 2200);
    });
  });
  div.appendChild(btn);
  aiBody.appendChild(div);
}

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text && !attachedFile) return;
  if (sendBtn.disabled) return;

  const file = attachedFile;
  const displayText = text || (file ? `[${file.name}]` : '');

  inputBox.value = "";
  inputBox.style.height = "auto";
  sendBtn.disabled = true;

  // 첫 메시지면 히스토리에 추가
  if (history.length === 0) {
    addToHistory(displayText.slice(0, 36) + (displayText.length > 36 ? '…' : ''));
  }

  removeAttachment();
  appendUser(displayText, file);

  // API에 보낼 content 구성
  let historyContent;
  if (file && file.type === 'image') {
    historyContent = [
      { type: "text", text: text || `이미지를 분석해줘: ${file.name}` },
      { type: "image_url", image_url: { url: file.dataUrl } }
    ];
  } else if (file && file.type === 'text' && file.content) {
    const preview = file.content.slice(0, 3000);
    historyContent = `[첨부 파일: ${file.name}]\n\`\`\`\n${preview}${file.content.length > 3000 ? '\n... (이하 생략)' : ''}\n\`\`\`\n\n${text}`;
  } else {
    historyContent = text || displayText;
  }

  history.push({ role: "user", content: historyContent });

  const row    = createAiRow();
  const mdDiv  = row.querySelector(".md");
  const aiBody = row.querySelector(".ai-body");
  let full = "";
  let started = false;
  const hasImage = history.some(m => Array.isArray(m.content) && m.content.some(c => c.type === 'image_url'));

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model:       hasImage ? "meta-llama/llama-4-scout-17b-16e-instruct" : "llama-3.3-70b-versatile",
        messages:    [{ role: "system", content: SYSTEM_PROMPT }, ...history],
        temperature: 0.25,
        max_tokens:  1600,
        stream:      true,
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6).trim();
        if (raw === "[DONE]") break;
        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content;
          if (delta) {
            if (!started) { mdDiv.innerHTML = ""; started = true; }
            full += delta;
            mdDiv.textContent = full;
            const cur = document.createElement("span");
            cur.className = "scursor";
            mdDiv.appendChild(cur);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch (_) {}
      }
    }

    if (full) {
      full = sanitize(full);
      mdDiv.innerHTML = renderMD(full);
      addActionBtn(aiBody, full);
    } else {
      mdDiv.innerHTML = "<p>죄송해요, 답변을 받지 못했어요. 다시 시도해 주세요.</p>";
    }

    history.push({ role: "assistant", content: full });
    if (history.length > 40) history.splice(0, 2);

  } catch (err) {
    mdDiv.innerHTML = `<p style="color:#f87171">⚠️ <strong>오류:</strong> ${esc(err.message)}</p>`;
    console.error(err);
  }

  sendBtn.disabled = false;
  chatArea.scrollTop = chatArea.scrollHeight;
  inputBox.focus();
}
